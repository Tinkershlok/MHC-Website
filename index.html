        <title>Mason Hack Club</title>
        <style>
            @keyframes typing{
                from {width: 0}
                to {width: 100%}
            }
            @keyframes blink {
                100% { border-color: white }
            }
            .animate-typing{
                width: 0;
                overflow: hidden;
                letter-spacing: 0.15em;
                white-space: nowrwap;
                animation:
                    typing 3s steps(45, end) 0.75s forwards,
                    blink 0.75s step-end 0s infinite;
            }
            @keyframes downArrow{
                from {width: 0;}
                to{width: 5%;}
                from{height: 0;}
                to{height: 5%;}
            }
            .animate-down{
                animation-name: downArrow;
                animation-duration: 5s;
                animation-iteration-count: infinite;
                height: 5%;
                width: 5%;
            }
        </style>
    </head>
